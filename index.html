<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0f172a">
<title>Control de Finanzas</title>
<link rel="manifest" href="manifest.json">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0f172a; color: #f1f5f9; min-height: 100dvh; padding-bottom: 80px;
}
.page { display: none; padding: 16px 20px; }
.page.active { display: block; }
.card { background: #1e293b; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.card-title { font-size: 13px; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; }
.balance-large { font-size: 32px; font-weight: 800; }
.balance-row { display: flex; gap: 16px; margin-top: 12px; }
.balance-row > div { flex: 1; padding: 12px; border-radius: 8px; }
.balance-row .inc { background: rgba(34,197,94,.1); }
.balance-row .exp { background: rgba(239,68,68,.1); }
.balance-row .amount { font-size: 18px; font-weight: 700; }
.income { color: #22c55e; }
.expense { color: #ef4444; }
.transaction-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #334155; }
.transaction-info { flex: 1; }
.transaction-info .cat { font-size: 14px; font-weight: 600; }
.transaction-info .desc { font-size: 12px; color: #94a3b8; }
.transaction-info .date { font-size: 11px; color: #64748b; }
.transaction-amount { font-size: 15px; font-weight: 700; }
.transaction-actions button { background: none; border: none; color: #64748b; cursor: pointer; padding: 4px 8px; font-size: 16px; }
nav {
  position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; border-top: 1px solid #334155;
  display: flex; z-index: 1000;
}
nav button {
  flex: 1; background: none; border: none; color: #94a3b8; padding: 12px 4px; font-size: 11px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
nav button.active { color: #3b82f6; }
nav button .nav-icon { font-size: 22px; }
.fab {
  position: fixed; bottom: 80px; right: 20px; width: 56px; height: 56px; border-radius: 50%;
  background: #3b82f6; color: white; border: none; font-size: 28px; cursor: pointer; z-index: 50;
  display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(59,130,246,.4);
}
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-content { background: #1e293b; border-radius: 20px 20px 0 0; width: 100%; max-width: 500px; max-height: 90dvh; overflow-y: auto; padding: 24px 20px; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-header h2 { font-size: 20px; }
.modal-close { background: none; border: none; color: #94a3b8; font-size: 24px; cursor: pointer; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 12px 14px; border-radius: 10px; background: #334155; border: 1px solid #334155;
  color: #f1f5f9; font-size: 15px; outline: none;
}
.form-group input:focus { border-color: #3b82f6; }
.btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
.btn-primary { background: #3b82f6; color: white; }
.btn-danger { background: #ef4444; color: white; }
header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #334155; }
header h1 { font-size: 20px; }
header .month-selector { display: flex; align-items: center; gap: 8px; }
header .month-selector button { background: #1e293b; border: 1px solid #334155; color: #f1f5f9; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px; }
header .month-selector span { font-size: 14px; min-width: 100px; text-align: center; }
.filters { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.filters select, .filters input { background: #334155; border: 1px solid #334155; color: #f1f5f9; padding: 8px 12px; border-radius: 8px; font-size: 13px; flex: 1; }
.empty-state { text-align: center; padding: 40px 20px; color: #94a3b8; }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.setting-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #334155; font-size: 14px; }
.settings-section { margin-bottom: 24px; }
.settings-section h3 { font-size: 14px; color: #94a3b8; margin-bottom: 12px; text-transform: uppercase; }
.budget-progress { margin-top: 8px; }
.budget-progress .bar { height: 6px; background: #334155; border-radius: 3px; overflow: hidden; }
.budget-progress .bar-fill { height: 100%; border-radius: 3px; transition: width .3s; }
.budget-progress .bar-fill.ok { background: #22c55e; }
.budget-progress .bar-fill.warn { background: #f59e0b; }
.budget-progress .bar-fill.over { background: #ef4444; }
.budget-info { font-size: 12px; color: #64748b; margin-top: 4px; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.tag.income { background: rgba(34,197,94,.15); color: #22c55e; }
.tag.expense { background: rgba(239,68,68,.15); color: #ef4444; }
.category-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #334155; }
.category-actions button { background: none; border: none; color: #64748b; cursor: pointer; padding: 4px 8px; }
</style>
</head>
<body>

<header>
  <h1>Finanzas</h1>
  <div class="month-selector">
    <button onclick="mes(-1)">&#8249;</button>
    <span id="mesTxt"></span>
    <button onclick="mes(1)">&#8250;</button>
  </div>
</header>

<div id="pagResumen" class="page active">
  <div class="card" id="cardBalance">
    <div class="card-title">Balance neto</div>
    <div class="balance-large" id="balanceNeto">$0</div>
    <div class="balance-row">
      <div class="inc"><div style="font-size:12px;color:#94a3b8">Ingresos</div><div class="amount income" id="totalIngresos">$0</div></div>
      <div class="exp"><div style="font-size:12px;color:#94a3b8">Gastos</div><div class="amount expense" id="totalGastos">$0</div></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Ultimos movimientos</div>
    <div id="ultimosMovs"></div>
  </div>
</div>

<div id="pagMovimientos" class="page">
  <div class="filters">
    <select id="filtroTipo"><option value="all">Todos</option><option value="income">Ingresos</option><option value="expense">Gastos</option></select>
    <select id="filtroCat"><option value="all">Categoria</option></select>
    <input type="month" id="filtroMes">
  </div>
  <div id="listaMovimientos"></div>
</div>

<div id="pagPresupuestos" class="page">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="card-title" style="margin:0">Presupuestos</div>
      <button onclick="showAddPresupuesto()" style="background:#3b82f6;border:none;color:white;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px">+ AÃ±adir</button>
    </div>
    <div id="listaPresupuestos"></div>
  </div>
</div>

<div id="pagAjustes" class="page">
  <div class="settings-section">
    <h3>Categorias</h3>
    <div id="listaCategorias"></div>
    <button class="btn btn-primary" style="margin-top:12px" onclick="showAddCategoria()">+ Nueva categoria</button>
  </div>
  <div class="settings-section">
    <h3>Datos</h3>
    <div class="setting-row"><span>Exportar</span><button class="btn btn-primary" style="width:auto;padding:8px 16px;font-size:13px" onclick="exportar()">CSV</button></div>
    <div class="setting-row"><span>Importar</span><input type="file" id="importFile" accept=".csv" style="display:none"><button class="btn btn-primary" style="width:auto;padding:8px 16px;font-size:13px" onclick="document.getElementById('importFile').click()">CSV</button></div>
    <div class="setting-row" style="border:none"><span>Borrar todo</span><button class="btn btn-danger" style="width:auto;padding:8px 16px;font-size:13px" onclick="borrarTodo()">Eliminar</button></div>
  </div>
</div>

<button class="fab" onclick="showAddMovimiento()">+</button>

<nav>
  <button class="active" onclick="irA('pagResumen')"><span class="nav-icon">&#9783;</span>Resumen</button>
  <button onclick="irA('pagMovimientos')"><span class="nav-icon">&#9776;</span>Movimientos</button>
  <button onclick="irA('pagPresupuestos')"><span class="nav-icon">&#9662;</span>Presupuestos</button>
  <button onclick="irA('pagAjustes')"><span class="nav-icon">&#9881;</span>Ajustes</button>
</nav>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content" id="modalContent">
    <div class="modal-header">
      <h2 id="modalTitle">Nuevo movimiento</h2>
      <button class="modal-close" onclick="cerrarModal()">&times;</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
let datos = { transacciones: [], categorias: [], presupuestos: [], mesActual: '' };
const CATS_DEFECTO = [
  { id: 'salario', nombre: 'Salario', icono: 'ðŸ’°' },
  { id: 'comida', nombre: 'Comida', icono: 'ðŸ”' },
  { id: 'transporte', nombre: 'Transporte', icono: 'ðŸšŒ' },
  { id: 'vivienda', nombre: 'Vivienda', icono: 'ðŸ ' },
  { id: 'servicios', nombre: 'Servicios', icono: 'ðŸ’¡' },
  { id: 'entretenimiento', nombre: 'Entretenimiento', icono: 'ðŸŽ¬' },
  { id: 'otros_ingresos', nombre: 'Otros ingresos', icono: 'ðŸ“¦' },
  { id: 'otros_gastos', nombre: 'Otros gastos', icono: 'ðŸ“‹' }
];

function formatear(n) { return '$' + Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }

function cargar() {
  try {
    const raw = localStorage.getItem('finanzas_datos');
    if (raw) datos = JSON.parse(raw);
  } catch(e) {}
  if (!datos.transacciones) datos.transacciones = [];
  if (!datos.categorias || !datos.categorias.length) datos.categorias = CATS_DEFECTO;
  if (!datos.presupuestos) datos.presupuestos = [];
  const ahora = new Date();
  datos.mesActual = ahora.getFullYear() + '-' + String(ahora.getMonth()+1).padStart(2,'0');
}

function guardar() { localStorage.setItem('finanzas_datos', JSON.stringify(datos)); }

function actualizarMesTxt() {
  const [y,m] = datos.mesActual.split('-').map(Number);
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('mesTxt').textContent = meses[m-1] + ' ' + y;
}

function mes(dir) {
  let [y,m] = datos.mesActual.split('-').map(Number);
  m += dir;
  if (m < 1) { m = 12; y--; }
  if (m > 12) { m = 1; y++; }
  datos.mesActual = y + '-' + String(m).padStart(2,'0');
  actualizarMesTxt();
  render();
}

function irA(pag) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pag).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const idx = { pagResumen:0, pagMovimientos:1, pagPresupuestos:2, pagAjustes:3 }[pag];
  if (idx !== undefined) document.querySelectorAll('nav button')[idx].classList.add('active');
  if (pag === 'pagMovimientos') renderMovimientos();
  else if (pag === 'pagPresupuestos') renderPresupuestos();
  else if (pag === 'pagAjustes') renderCategorias();
  else if (pag === 'pagResumen') renderResumen();
}

function abrirModal(titulo, contenido) {
  document.getElementById('modalTitle').textContent = titulo;
  document.getElementById('modalBody').innerHTML = contenido;
  document.getElementById('modalOverlay').classList.add('open');
}

function cerrarModal() { document.getElementById('modalOverlay').classList.remove('open'); }
document.getElementById('modalOverlay').onclick = function(e) { if (e.target === this) cerrarModal(); };

function mostrarMsj(msj) {
  return new Promise(function(resolve) {
    var overlay = document.getElementById('modalOverlay');
    var content = document.getElementById('modalContent');
    overlay.classList.add('open');
    content.innerHTML = '<div style="text-align:center;padding:10px 0"><div style="font-size:15px;color:#94a3b8;margin-bottom:20px">' + msj + '</div><button class="btn btn-primary" id="btnMsjOk">OK</button></div>';
    document.getElementById('btnMsjOk').onclick = function() { cerrarModal(); resolve(true); };
  });
}

async function confirmar(msj) {
  return new Promise(function(resolve) {
    var overlay = document.getElementById('modalOverlay');
    var content = document.getElementById('modalContent');
    overlay.classList.add('open');
    content.innerHTML = '<div style="text-align:center;padding:10px 0"><div style="font-size:15px;color:#94a3b8;margin-bottom:20px">' + msj + '</div><div style="display:flex;gap:12px"><button class="btn btn-secondary" id="btnConfirmNo" style="flex:1;background:#334155;border:none;border-radius:10px;padding:14px;color:white;font-size:16px;font-weight:600;cursor:pointer">Cancelar</button><button class="btn btn-primary" id="btnConfirmSi" style="flex:1">OK</button></div></div>';
    document.getElementById('btnConfirmSi').onclick = function() { cerrarModal(); resolve(true); };
    document.getElementById('btnConfirmNo').onclick = function() { cerrarModal(); resolve(false); };
  });
}

// ===== TRANSACCIONES =====
function showAddMovimiento(editId) {
  var t = editId ? datos.transacciones.find(function(x) { return x.id === editId; }) : null;
  var esEdit = !!t;
  var type = t ? t.tipo : 'expense';
  var monto = t ? t.monto : '';
  var cat = t ? t.categoria : '';
  var fecha = t ? t.fecha : new Date().toISOString().slice(0,10);
  var desc = t ? t.descripcion : '';
  var opts = datos.categorias.map(function(c) {
    return '<option value="' + c.id + '"' + (cat === c.id ? ' selected' : '') + '>' + (c.icono || '') + ' ' + c.nombre + '</option>';
  }).join('');
  window._tipoTx = type;
  abrirModal(esEdit ? 'Editar movimiento' : 'Nuevo movimiento',
    '<div class="form-group"><label>Tipo</label><div style="display:flex;gap:0;border-radius:10px;overflow:hidden;border:1px solid #334155">' +
    '<button class="btnTipo' + (type === 'expense' ? ' actExp' : '') + '" data-tipo="expense" onclick="setTipo(\'expense\')" style="flex:1;padding:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;background:#334155;color:#94a3b8">Gasto</button>' +
    '<button class="btnTipo' + (type === 'income' ? ' actInc' : '') + '" data-tipo="income" onclick="setTipo(\'income\')" style="flex:1;padding:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;background:#334155;color:#94a3b8">Ingreso</button></div></div>' +
    '<div class="form-group"><label>Monto</label><input type="number" id="txMonto" step="0.01" min="0" placeholder="0.00" value="' + monto + '" inputmode="decimal"></div>' +
    '<div class="form-group"><label>Categoria</label><select id="txCat">' + opts + '</select></div>' +
    '<div class="form-group"><label>Fecha</label><input type="date" id="txFecha" value="' + fecha + '"></div>' +
    '<div class="form-group"><label>Descripcion</label><textarea id="txDesc" placeholder="Opcional...">' + desc + '</textarea></div>' +
    '<button class="btn btn-primary" onclick="guardarMovimiento(\'' + (esEdit ? editId : '') + '\')">' + (esEdit ? 'Guardar' : 'AÃ±adir') + '</button>'
  );
}

function setTipo(tipo) {
  window._tipoTx = tipo;
  document.querySelectorAll('.btnTipo').forEach(function(b) {
    b.style.background = '#334155';
    b.style.color = '#94a3b8';
    if (b.dataset.tipo === tipo) {
      b.style.background = tipo === 'income' ? '#22c55e' : '#ef4444';
      b.style.color = 'white';
    }
  });
}

function guardarMovimiento(editId) {
  var monto = parseFloat(document.getElementById('txMonto').value);
  if (!monto || monto <= 0) { mostrarMsj('Ingresa un monto valido'); return; }
  var cat = document.getElementById('txCat').value;
  var fecha = document.getElementById('txFecha').value;
  var desc = document.getElementById('txDesc').value.trim();
  var tx = {
    id: editId || Date.now().toString(36) + Math.random().toString(36).slice(2,5),
    tipo: window._tipoTx || 'expense',
    monto: Math.round(monto * 100) / 100,
    categoria: cat,
    fecha: fecha,
    descripcion: desc,
    createdAt: editId ? (datos.transacciones.find(function(t) { return t.id === editId; })?.createdAt || new Date().toISOString()) : new Date().toISOString()
  };
  if (editId) {
    var idx = datos.transacciones.findIndex(function(t) { return t.id === editId; });
    if (idx !== -1) datos.transacciones[idx] = tx;
  } else {
    datos.transacciones.push(tx);
  }
  guardar();
  cerrarModal();
  render();
  irA('pagMovimientos');
}

async function borrarTransaccion(id) {
  if (!await confirmar('Eliminar este movimiento?')) return;
  datos.transacciones = datos.transacciones.filter(function(t) { return t.id !== id; });
  guardar(); render();
  var activa = document.querySelector('.page.active');
  if (activa) {
    if (activa.id === 'pagMovimientos') renderMovimientos();
    else renderResumen();
  }
}

// ===== CATEGORIAS =====
function showAddCategoria() {
  abrirModal('Nueva categoria',
    '<div class="form-group"><label>Nombre</label><input type="text" id="catName" placeholder="Ej: Transporte"></div>' +
    '<div class="form-group"><label>Icono (opcional)</label><input type="text" id="catIcon" placeholder="Ej: ðŸš—" maxlength="2"></div>' +
    '<button class="btn btn-primary" onclick="guardarCategoria()">Guardar</button>'
  );
}

function guardarCategoria() {
  var nombre = document.getElementById('catName').value.trim();
  if (!nombre) { mostrarMsj('Ingresa un nombre'); return; }
  var icono = document.getElementById('catIcon').value.trim() || 'ðŸ“‹';
  var id = nombre.toLowerCase().replace(/[^a-z0-9]/g, '_');
  if (datos.categorias.find(function(c) { return c.id === id; })) { mostrarMsj('Ya existe'); return; }
  datos.categorias.push({ id: id, nombre: nombre, icono: icono });
  guardar(); cerrarModal(); renderCategorias(); actualizarFiltroCat();
}

async function borrarCategoria(id) {
  if (datos.transacciones.some(function(t) { return t.categoria === id; })) {
    await mostrarMsj('No se puede: hay movimientos con esta categoria');
    return;
  }
  if (!await confirmar('Eliminar categoria?')) return;
  datos.categorias = datos.categorias.filter(function(c) { return c.id !== id; });
  guardar(); renderCategorias(); actualizarFiltroCat();
}

// ===== PRESUPUESTOS =====
function showAddPresupuesto() {
  var opts = datos.categorias.map(function(c) {
    return '<option value="' + c.id + '">' + (c.icono || '') + ' ' + c.nombre + '</option>';
  }).join('');
  abrirModal('Nuevo presupuesto',
    '<div class="form-group"><label>Categoria</label><select id="presupCat">' + opts + '</select></div>' +
    '<div class="form-group"><label>Limite mensual ($)</label><input type="number" id="presupMonto" step="0.01" min="0" placeholder="0.00" inputmode="decimal"></div>' +
    '<button class="btn btn-primary" onclick="guardarPresupuesto()">Guardar</button>'
  );
}

async function guardarPresupuesto() {
  var cat = document.getElementById('presupCat').value;
  var monto = parseFloat(document.getElementById('presupMonto').value);
  if (!monto || monto <= 0) { mostrarMsj('Ingresa un monto valido'); return; }
  if (datos.presupuestos.find(function(b) { return b.categoria === cat; })) {
    if (!await confirmar('Ya hay un presupuesto para esta categoria. Reemplazarlo?')) return;
    datos.presupuestos = datos.presupuestos.filter(function(b) { return b.categoria !== cat; });
  }
  datos.presupuestos.push({ id: Date.now().toString(36), categoria: cat, monto: Math.round(monto * 100) / 100 });
  guardar(); cerrarModal(); renderPresupuestos();
}

function borrarPresupuesto(id) {
  datos.presupuestos = datos.presupuestos.filter(function(b) { return b.id !== id; });
  guardar(); renderPresupuestos();
}

// ===== EXPORT/IMPORT =====
function exportar() {
  var rows = [['Tipo','Monto','Categoria','Fecha','Descripcion']];
  datos.transacciones.forEach(function(t) {
    var cat = datos.categorias.find(function(c) { return c.id === t.categoria; });
    rows.push([t.tipo, t.monto, cat ? cat.nombre : t.categoria, t.fecha, t.descripcion]);
  });
  var csv = rows.map(function(r) { return r.map(function(v) { return typeof v === 'string' ? '"' + v.replace(/"/g,'""') + '"' : v; }).join(','); }).join('\n');
  var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'finanzas.csv'; a.click();
}

async function importar(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = async function(ev) {
    var lines = ev.target.result.split(/\r?\n/).filter(function(l) { return l.trim(); });
    if (lines.length < 2) { mostrarMsj('Archivo vacio'); return; }
    if (!await confirmar('Importar datos? Se aÃ±adiran a los existentes.')) return;
    var headers = lines[0].split(',').map(function(h) { return h.replace(/"/g,'').trim().toLowerCase(); });
    var count = 0;
    for (var i = 1; i < lines.length; i++) {
      var vals = lines[i].split(',');
      if (vals.length < 2) continue;
      var row = {};
      headers.forEach(function(h, idx) { row[h] = vals[idx] || ''; });
      if (!row.tipo || !row.monto) continue;
      var catId = row.categoria ? row.categoria.toLowerCase().replace(/[^a-z0-9]/g,'_') : 'otros_gastos';
      if (!datos.categorias.find(function(c) { return c.id === catId; })) {
        datos.categorias.push({ id: catId, nombre: row.categoria, icono: 'ðŸ“‹' });
      }
      datos.transacciones.push({
        id: Date.now().toString(36) + Math.random().toString(36).slice(2,5) + count,
        tipo: row.tipo === 'income' || row.tipo === 'ingreso' ? 'income' : 'expense',
        monto: parseFloat(row.monto) || 0,
        categoria: catId,
        fecha: row.fecha || new Date().toISOString().slice(0,10),
        descripcion: row.descripcion || row.descripciÃ³n || '',
        createdAt: new Date().toISOString()
      });
      count++;
    }
    guardar(); render();
    await mostrarMsj('Importados ' + count + ' movimientos');
    e.target.value = '';
  };
  reader.readAsText(file, 'UTF-8');
}

async function borrarTodo() {
  if (!await confirmar('Eliminar TODOS los datos?')) return;
  if (!await confirmar('Seguro?')) return;
  datos.transacciones = [];
  datos.presupuestos = [];
  guardar(); render();
}

function actualizarFiltroCat() {
  var sel = document.getElementById('filtroCat');
  var actual = sel.value;
  sel.innerHTML = '<option value="all">Categoria</option>' +
    datos.categorias.map(function(c) { return '<option value="' + c.id + '"' + (actual === c.id ? ' selected' : '') + '>' + (c.icono || '') + ' ' + c.nombre + '</option>'; }).join('');
}

// ===== RENDER =====
function render() {
  renderResumen();
  renderMovimientos();
  renderPresupuestos();
  renderCategorias();
  actualizarFiltroCat();
}

function renderResumen() {
  var mes = datos.mesActual;
  var txs = datos.transacciones.filter(function(t) { return t.fecha.slice(0,7) === mes; });
  var totalInc = txs.filter(function(t) { return t.tipo === 'income'; }).reduce(function(s,t) { return s + t.monto; }, 0);
  var totalExp = txs.filter(function(t) { return t.tipo === 'expense'; }).reduce(function(s,t) { return s + t.monto; }, 0);
  var neto = totalInc - totalExp;
  document.getElementById('balanceNeto').textContent = formatear(neto);
  document.getElementById('balanceNeto').style.color = neto >= 0 ? '#22c55e' : '#ef4444';
  document.getElementById('totalIngresos').textContent = formatear(totalInc);
  document.getElementById('totalGastos').textContent = formatear(totalExp);
  var recientes = txs.sort(function(a,b) { return b.fecha.localeCompare(a.fecha) || (b.createdAt || '').localeCompare(a.createdAt || ''); }).slice(0,5);
  var cont = document.getElementById('ultimosMovs');
  if (!recientes.length) {
    cont.innerHTML = '<div class="empty-state"><div class="icon">ðŸ“­</div><p>No hay movimientos</p></div>';
  } else {
    cont.innerHTML = recientes.map(function(t) { return itemHTML(t); }).join('');
  }
}

function itemHTML(t) {
  var cat = datos.categorias.find(function(c) { return c.id === t.categoria; });
  var icono = cat ? cat.icono : 'ðŸ“‹';
  var catNombre = cat ? cat.nombre : t.categoria;
  var fecha = new Date(t.fecha).toLocaleDateString('es-ES', { day:'numeric', month:'short' });
  var desc = t.descripcion || catNombre;
  return '<div class="transaction-item">' +
    '<div style="width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:' + (t.tipo === 'income' ? 'rgba(34,197,94,.15)' : 'rgba(239,68,68,.15)') + '">' + icono + '</div>' +
    '<div class="transaction-info"><div class="cat">' + catNombre + '</div><div class="desc">' + desc + '</div><div class="date">' + fecha + '</div></div>' +
    '<div class="transaction-amount ' + t.tipo + '">' + formatear(t.monto) + '</div>' +
    '<div class="transaction-actions"><button onclick="showAddMovimiento(\'' + t.id + '\')">âœï¸</button><button onclick="borrarTransaccion(\'' + t.id + '\')">ðŸ—‘ï¸</button></div></div>';
}

function renderMovimientos() {
  var tipo = document.getElementById('filtroTipo').value;
  var cat = document.getElementById('filtroCat').value;
  var mes = document.getElementById('filtroMes').value || datos.mesActual;
  var filtrados = datos.transacciones.filter(function(t) { return t.fecha.slice(0,7) === mes; });
  if (tipo !== 'all') filtrados = filtrados.filter(function(t) { return t.tipo === tipo; });
  if (cat !== 'all') filtrados = filtrados.filter(function(t) { return t.categoria === cat; });
  filtrados.sort(function(a,b) { return b.fecha.localeCompare(a.fecha) || (b.createdAt || '').localeCompare(a.createdAt || ''); });
  var cont = document.getElementById('listaMovimientos');
  if (!filtrados.length) {
    cont.innerHTML = '<div class="empty-state"><div class="icon">ðŸ“­</div><p>No hay movimientos</p></div>';
  } else {
    cont.innerHTML = filtrados.map(function(t) { return itemHTML(t); }).join('');
  }
}

function renderPresupuestos() {
  var mes = datos.mesActual;
  var cont = document.getElementById('listaPresupuestos');
  if (!datos.presupuestos.length) {
    cont.innerHTML = '<div class="empty-state"><div class="icon">ðŸŽ¯</div><p>No hay presupuestos</p></div>';
    return;
  }
  var gastos = datos.transacciones.filter(function(t) { return t.tipo === 'expense' && t.fecha.slice(0,7) === mes; });
  var gastado = {};
  gastos.forEach(function(t) { gastado[t.categoria] = (gastado[t.categoria] || 0) + t.monto; });
  cont.innerHTML = datos.presupuestos.map(function(b) {
    var gasto = gastado[b.categoria] || 0;
    var pct = b.monto > 0 ? Math.min((gasto / b.monto) * 100, 100) : 0;
    var barClass = gasto > b.monto ? 'over' : (pct > 80 ? 'warn' : 'ok');
    var cat = datos.categorias.find(function(c) { return c.id === b.categoria; });
    var catName = cat ? (cat.icono || '') + ' ' + cat.nombre : b.categoria;
    return '<div class="transaction-item"><div style="flex:1">' +
      '<div style="display:flex;justify-content:space-between"><span style="font-size:14px;font-weight:600">' + catName + '</span><span style="font-size:13px;font-weight:600">' + formatear(gasto) + ' / ' + formatear(b.monto) + '</span></div>' +
      '<div class="budget-progress"><div class="bar"><div class="bar-fill ' + barClass + '" style="width:' + pct + '%"></div></div><div class="budget-info">' + pct.toFixed(0) + '% usado' + (gasto > b.monto ? ' Excedido!' : '') + '</div></div></div>' +
      '<div class="category-actions"><button onclick="borrarPresupuesto(\'' + b.id + '\')">ðŸ—‘ï¸</button></div></div>';
  }).join('');
}

function renderCategorias() {
  var cont = document.getElementById('listaCategorias');
  cont.innerHTML = datos.categorias.map(function(c) {
    return '<div class="category-item"><span>' + (c.icono || 'ðŸ“‹') + ' ' + c.nombre + '</span>' +
      '<div class="category-actions"><button onclick="borrarCategoria(\'' + c.id + '\')">ðŸ—‘ï¸</button></div></div>';
  }).join('');
}

// ===== INICIO =====
cargar();
actualizarMesTxt();
render();
document.getElementById('filtroMes').value = datos.mesActual;
document.getElementById('filtroTipo').addEventListener('change', renderMovimientos);
document.getElementById('filtroCat').addEventListener('change', renderMovimientos);
document.getElementById('filtroMes').addEventListener('change', renderMovimientos);
document.getElementById('importFile').addEventListener('change', importar);
</script>
</body>
